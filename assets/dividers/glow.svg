<svg xmlns="http://www.w3.org/2000/svg" width="900" height="32" viewBox="0 0 900 32" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#79c0ff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
